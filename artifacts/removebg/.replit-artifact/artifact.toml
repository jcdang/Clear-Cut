kind = "web"
previewPath = "/"
title = "Remove Background"
version = "1.0.0"
id = "artifacts/removebg"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21122

[services.development]
run = "pnpm --filter @workspace/removebg run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/removebg", "run", "build" ]
publicDir = "artifacts/removebg/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21122"
BASE_PATH = "/"
